name: Component Registry Lock

on:
  push:
    paths:
      - 'src/components/**'
      - 'src/components/.component-registry.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Load Registry
        id: registry
        run: |
          echo "registry=$(cat src/components/.component-registry.json | jq -c .)" >> $GITHUB_OUTPUT
      
      - name: Verify Tokenized Components
        run: |
          echo '${{ steps.registry.outputs.registry }}' | jq -c '.components[] | select(.status == "tokenized")' | while read component; do
            name=$(echo $component | jq -r '.name')
            path=$(echo $component | jq -r '.path')
            patterns=$(echo $component | jq -r '.forbiddenPatterns[]')
            
            echo "Verifying $name at $path..."
            
            for pattern in $patterns; do
              if grep -rE "$pattern" "$path"; then
                echo "❌ LOCK VIOLATION: $name contains forbidden pattern: $pattern"
                exit 1
              fi
            done
            
            echo "✅ $name verified"
          done
      
      - name: Verify Native Components
        run: |
          echo '${{ steps.registry.outputs.registry }}' | jq -c '.components[] | select(.origin == "signet-native")' | while read component; do
            name=$(echo $component | jq -r '.name')
            path=$(echo $component | jq -r '.path')
            
            echo "Checking $name for @origin signet-native badge..."
            
            if ! grep -q "@origin signet-native" "$path"; then
              echo "❌ CERTIFICATION VIOLATION: $name missing @origin signet-native badge"
              exit 1
            fi
            
            echo "✅ $name certified"
          done
